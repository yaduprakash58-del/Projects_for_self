services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bill-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres?sslmode=require
      SPRING_DATASOURCE_USERNAME: postgres.kgvrgtqhkgtyxlkerlsz
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      APP_JWT_SECRET: ${JWT_SECRET}
      APP_CORS_ALLOWED_ORIGINS: http://localhost,https://projects-for-self-mvfy.vercel.app
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: bill-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
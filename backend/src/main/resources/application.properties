spring.application.name=bill-backend

# Database (Supabase Transaction Pooler)
spring.datasource.url=jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.username=postgres.kgvrgtqhkgtyxlkerlsz
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration=86400000

# Initial admin password (only used when seeding a fresh DB).
# Override in production via the APP_ADMIN_PASSWORD environment variable.
app.admin.password=admin123

# Mail (SMTP). Configure via env vars in production, e.g. a Gmail App Password.
# Sending is disabled until MAIL_USERNAME/MAIL_PASSWORD are set.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
# From-address shown to recipients (defaults to the SMTP username if blank).
app.mail.from=${MAIL_FROM:}

# WhatsApp click-to-chat: default country code prepended to local (<=10 digit) numbers.
app.whatsapp.default-country-code=${WHATSAPP_COUNTRY_CODE:91}

# Server
server.port=8080

# CORS
app.cors.allowed-origins=http://localhost:3000,https://projects-for-self-mvfy.vercel.app

# Logging
logging.level.com.billapp=INFO

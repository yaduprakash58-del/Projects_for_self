spring.application.name=bill-backend

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/billdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=billAppSecretKey2024VeryLongSecretKeyForJWTSigning123456
app.jwt.expiration=86400000

# Server
server.port=8080

# CORS
app.cors.allowed-origins=http://localhost:3000

# Logging
logging.level.com.billapp=INFO
